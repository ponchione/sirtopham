project_root: /home/gernsback/source/sirtopham
log_level: info
log_format: text

server:
  host: localhost
  port: 8090
  dev_mode: false
  open_browser: false

routing:
  default:
    provider: codex
    model: gpt-5.4-mini

providers:
  codex:
    type: codex
    model: gpt-5.4-mini

index:
  include:
    - "**/*.go"
    - "**/*.sql"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.yml"
  exclude:
    - "**/.git/**"
    - "**/.sirtopham/**"
    - "**/.brain/**"
    - "**/.hermes/**"
    - "**/.claude/**"
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/coverage/**"
    - "**/tmp/**"
    - "**/.next/**"
    - "**/.turbo/**"
    - "**/*.min.js"
    - "**/docs/**"
    - "**/specs/**"
    - "**/design/**"
    - "**/plans/**"
    - "**/audit/**"
    - "**/README.md"
    - "**/NEXT_SESSION_HANDOFF.md"
    - "**/TECH-DEBT.md"

brain:
  enabled: true
  vault_path: .brain
  reindex_on_startup: true
  log_brain_queries: true

local_services:
  enabled: true
  mode: manual
  provider: docker-compose
  compose_file: ./ops/llm/docker-compose.yml
  project_dir: ./ops/llm
  required_networks:
    - llm-net
  auto_create_networks: true
  startup_timeout_seconds: 180
  healthcheck_interval_seconds: 2
  services:
    qwen-coder:
      base_url: http://localhost:12434
      health_path: /health
      models_path: /v1/models
      required: true
    nomic-embed:
      base_url: http://localhost:12435
      health_path: /health
      models_path: /v1/models
      required: true

embedding:
  base_url: http://localhost:12435
  model: nomic-embed-code
  batch_size: 32
  timeout_seconds: 30
  query_prefix: "Represent this query for searching relevant code: "
