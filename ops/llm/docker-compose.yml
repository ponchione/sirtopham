services:
  qwen-coder:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen-coder-server
    restart: "no"
    networks:
      - llm-net
    ports:
      - "12434:12434"
    volumes:
      - ./models:/models:ro
      - ./logs:/logs
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --host 0.0.0.0
      --port 12434
      -m /models/Qwen2.5-Coder-7B-Instruct-Q6_K_L.gguf
      -c 8192
      --flash-attn on
      --parallel 1
      --gpu-layers 999

  nomic-embed:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: nomic-embed-server
    restart: "no"
    networks:
      - llm-net
    ports:
      - "12435:12435"
    volumes:
      - ./models:/models:ro
      - ./logs:/logs
    gpus: all
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --host 0.0.0.0
      --port 12435
      --embeddings
      --pooling last
      -m /models/nomic-embed-code.Q8_0.gguf
      -c 8192
      --flash-attn on
      --parallel 1
      --gpu-layers 999

networks:
  llm-net:
    external: true
