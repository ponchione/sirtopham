project_root: /home/gernsback/source/sodoryard
log_level: info
log_format: text

server:
  host: localhost
  port: 8090
  dev_mode: false
  open_browser: false

routing:
  default:
    provider: codex
    model: gpt-5.4-mini

providers:
  codex:
    type: codex
    model: gpt-5.4-mini

index:
  include:
    - "**/*.go"
    - "**/*.sql"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.json"
    - "**/*.yaml"
    - "**/*.yml"
  exclude:
    - "**/.git/**"
    - "**/.yard/**"
    - "**/.brain/**"
    - "**/.hermes/**"
    - "**/.claude/**"
    - "**/node_modules/**"
    - "**/vendor/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/coverage/**"
    - "**/tmp/**"
    - "**/.next/**"
    - "**/.turbo/**"
    - "**/*.min.js"
    - "**/docs/**"
    - "**/specs/**"
    - "**/design/**"
    - "**/plans/**"
    - "**/audit/**"
    - "**/README.md"
    - "**/NEXT_SESSION_HANDOFF.md"
    - "**/TECH-DEBT.md"

brain:
  enabled: true
  vault_path: .brain
  log_brain_queries: true

agent_roles:
  orchestrator:
    system_prompt: agents/orchestrator.md
    tools:
      - brain
    custom_tools:
      - spawn_agent
      - chain_complete
    brain_write_paths:
      - "receipts/orchestrator/**"
      - "logs/orchestrator/**"
      - "plans/**"
    brain_deny_paths:
      - "specs/**"
      - "architecture/**"
      - "conventions/**"
    max_turns: 50
    max_tokens: 500000

  epic-decomposer:
    system_prompt: agents/epic-decomposer.md
    tools:
      - brain
    brain_write_paths:
      - "epics/**"
      - "receipts/epic-decomposer/**"
      - "logs/epic-decomposer/**"
    brain_deny_paths:
      - "specs/**"
      - "architecture/**"
      - "conventions/**"
      - "tasks/**"
      - "plans/**"
    max_turns: 20
    max_tokens: 200000

  task-decomposer:
    system_prompt: agents/task-decomposer.md
    tools:
      - brain
    brain_write_paths:
      - "tasks/**"
      - "receipts/task-decomposer/**"
